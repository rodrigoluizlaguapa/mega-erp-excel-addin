<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <script type="text/javascript" src="https://ajax.aspnetcdn.com/ajax/jQuery/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="taskpane.css" />
    <script type="text/javascript" src="taskpane.js"></script>
    <style>
        .tabs { display: flex; background: #f3f2f1; border-bottom: 1px solid #ccc; }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; font-size: 12px; font-weight: bold; color: #666; }
        .tab.active { background: #fff; color: #0078d4; border-bottom: 2px solid #0078d4; }
        .content { display: none; padding: 15px; }
        .content.active { display: block; }
        .btn-mega { background: #0078d4; color: white; border: none; padding: 12px; width: 100%; cursor: pointer; font-weight: bold; border-radius: 4px; margin-top: 10px; }
        .btn-template { background: #217346; } /* Verde Excel */
    </style>
</head>
<body>
    <div class="tabs">
        <div class="tab active" onclick="switchTab('relat', this)">RELATÓRIOS</div>
        <div class="tab" onclick="switchTab('agnt', this)">AGENTES</div>
    </div>

    <div id="relat" class="content active">
        <label style="font-size:12px; font-weight:bold;">Módulo:</label>
        <select id="modulo" style="width:100%; padding:8px; margin-bottom:10px;">
            <option value="list">Razão Contábil</option>
            <option value="agentes">Lista de Agentes</option>
        </select>
        <div style="display:flex; gap:5px;">
            <div><label style="font-size:11px;">Início:</label><input type="date" id="data-inicio" value="2026-03-01" style="width:100%;"></div>
            <div><label style="font-size:11px;">Fim:</label><input type="date" id="data-fim" value="2026-03-31" style="width:100%;"></div>
        </div>
        <button class="btn-mega" onclick="syncData()">Baixar para o Excel</button>
    </div>

    <div id="agnt" class="content">
        <label style="font-weight:bold; font-size:12px;">Cadastro em Massa:</label>
        <button class="btn-mega btn-template" onclick="gerarTemplateAgentes()">1. Gerar Planilha Modelo</button>
        <button class="btn-mega" style="background:#d83b01;" onclick="processarInclusoesAgentes()">2. Enviar Cadastros ao Mega</button>
        <p style="font-size:10px; color:#666; margin-top:10px;">Preencha a planilha e clique em enviar. O status aparecerá na coluna G.</p>
    </div>

    <div id="status" style="margin-top:20px; font-size:11px; text-align:center; color:#666;">Pronto para operar.</div>

    <div style="font-size: 9px; color: #999; text-align: center; margin-top: 20px; border-top: 1px solid #eee; padding-top: 10px;">
        LG CFO - v1.2.0 (Estável)<br>Ambiente: Produção GitHub
    </div>

    <script>
        function switchTab(id, el) {
            $('.content').removeClass('active');
            $('.tab').removeClass('active');
            $('#' + id).addClass('active');
            $(el).addClass('active');
        }
    </script>
</body>
</html>
