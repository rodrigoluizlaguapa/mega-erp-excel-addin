<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LG CFO - Mega ERP</title>

    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <script type="text/javascript" src="https://ajax.aspnetcdn.com/ajax/jQuery/jquery-3.6.0.min.js"></script>
    
    <link rel="stylesheet" href="taskpane.css" />
    <script type="text/javascript" src="taskpane.js"></script>

    <script type="text/javascript">
        // Este é o vínculo que faltava para a Ribbon funcionar
        Office.onReady((info) => {
            if (info.host === Office.HostType.Excel) {
                console.log("LG CFO: Vinculando funções à Ribbon...");
                Office.actions.associate("gerarTemplateAgentes", gerarTemplateAgentes);
                Office.actions.associate("processarInclusoesAgentes", processarInclusoesAgentes);
            }
        });
    </script>
</head>
<body>
    <div id="container">
      <div class="header">
        <h3>LG CFO - Mega ERP</h3>
        <p style="font-size: 11px; color: #666;">Painel de Controle</p>
        
        <div class="form-group">
          <label>Módulo:</label>
          <select id="modulo">
            <option value="list">Razão Contábil</option>
            <option value="agentes">Lista de Agentes</option>
          </select>
        </div>

        <div id="filtros-data">
          <div class="form-group">
            <label>Data Início:</label>
            <input type="date" id="data-inicio" value="2026-03-01">
          </div>
          <div class="form-group">
            <label>Data Fim:</label>
            <input type="date" id="data-fim" value="2026-03-31">
          </div>
        </div>

        <button id="btn-sync" class="btn-mega">Baixar dados para o Excel</button>
      </div>
      
      <div id="status">Pronto.</div>

      <div style="margin-top: 20px; font-size: 10px; color: #999; text-align: center; border-top: 1px solid #eee; padding-top: 10px;">
        Versão: 1.2.5 | LG CFO<br>
        Status Ribbon: Ativado
      </div>
    </div>
</body>
</html>
