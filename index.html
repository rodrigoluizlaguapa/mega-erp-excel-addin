<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LG CFO - Mega ERP</title>
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <script type="text/javascript" src="https://ajax.aspnetcdn.com/ajax/jQuery/jquery-3.6.0.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue:       #0078d4;
            --blue-dark:  #005a9e;
            --blue-pale:  #e8f4fd;
            --green:      #107c41;
            --green-dark: #0d6534;
            --orange:     #c84b00;
            --orange-dark:#a33b00;
            --red-pale:   #fdf0ee;
            --red-text:   #7a1a00;
            --red-border: #f0b8a8;
            --ok-pale:    #edf7f0;
            --ok-text:    #0d4a21;
            --ok-border:  #a8d8b8;
            --warn-pale:  #fff8e6;
            --warn-text:  #7a5000;
            --warn-border:#f0d88a;
            --bg:         #f5f5f5;
            --surface:    #ffffff;
            --border:     #d0d0d0;
            --text:       #1a1a1a;
            --text-muted: #666666;
            --radius:     6px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: var(--blue);
            padding: 10px 14px 8px;
            display: flex;
            align-items: baseline;
            gap: 8px;
            flex-shrink: 0;
        }
        .header-title {
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.02em;
        }
        .header-sub {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: rgba(255,255,255,0.65);
            letter-spacing: 0.04em;
        }

        .tabs {
            display: flex;
            background: var(--surface);
            border-bottom: 2px solid var(--border);
            flex-shrink: 0;
        }
        .tab {
            flex: 1;
            padding: 10px 0;
            text-align: center;
            cursor: pointer;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            letter-spacing: 0.06em;
            transition: color 0.15s, border-color 0.15s;
        }
        .tab:hover { color: var(--blue); }
        .tab.active { color: var(--blue); border-bottom-color: var(--blue); }

        #status {
            margin: 12px 14px 0;
            font-size: 12px;
            font-weight: 500;
            padding: 9px 12px;
            border-radius: var(--radius);
            border: 1px solid var(--blue-pale);
            background: var(--blue-pale);
            color: var(--blue-dark);
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 38px;
            transition: background 0.25s, color 0.25s, border-color 0.25s;
            flex-shrink: 0;
        }
        #status.loading { background: var(--warn-pale); color: var(--warn-text); border-color: var(--warn-border); }
        #status.sucesso { background: var(--ok-pale);   color: var(--ok-text);   border-color: var(--ok-border); }
        #status.erro    { background: var(--red-pale);  color: var(--red-text);  border-color: var(--red-border); }

        .spinner {
            width: 14px; height: 14px;
            border: 2px solid currentColor;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
            flex-shrink: 0;
        }
        #status.loading .spinner { display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .content { display: none; padding: 14px; flex: 1; overflow-y: auto; }
        .content.active { display: block; }

        .form-group { margin-bottom: 13px; }
        label {
            font-size: 11px;
            font-weight: 700;
            display: block;
            margin-bottom: 4px;
            color: var(--text-muted);
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        select, input[type="date"] {
            width: 100%;
            padding: 7px 9px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            color: var(--text);
            background: var(--surface);
            appearance: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        select:focus, input:focus {
            outline: none;
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(0,120,212,0.15);
        }
        input.invalid { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(200,75,0,0.12); }

        .date-row { display: flex; gap: 10px; }
        .date-row .form-group { flex: 1; }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            background: var(--blue);
            color: #fff;
            border: none;
            padding: 10px 14px;
            width: 100%;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 0.04em;
            border-radius: var(--radius);
            margin-top: 10px;
            transition: background 0.15s, opacity 0.15s, transform 0.1s;
        }
        .btn:hover:not(:disabled) { background: var(--blue-dark); transform: translateY(-1px); }
        .btn:active:not(:disabled) { transform: translateY(0); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-green { background: var(--green); }
        .btn-green:hover:not(:disabled) { background: var(--green-dark); }
        .btn-orange { background: var(--orange); }
        .btn-orange:hover:not(:disabled) { background: var(--orange-dark); }

        .section-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            text-transform: uppercase;
            margin: 16px 0 6px;
            padding-bottom: 4px;
            border-bottom: 1px solid var(--border);
        }

        .agent-note {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 14px;
            text-align: center;
            line-height: 1.5;
        }

        #progress-wrap {
            margin: 10px 14px 0;
            display: none;
            flex-shrink: 0;
        }
        #progress-wrap.visible { display: block; }
        #progress-bar-bg {
            background: var(--border);
            border-radius: 99px;
            height: 4px;
            overflow: hidden;
        }
        #progress-bar {
            height: 100%;
            width: 0%;
            background: var(--blue);
            border-radius: 99px;
            transition: width 0.3s ease;
        }
        #progress-label {
            font-size: 10px;
            color: var(--text-muted);
            font-family: 'DM Mono', monospace;
            text-align: right;
            margin-top: 3px;
        }

        .version-badge {
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            background: rgba(0,0,0,0.08);
            color: var(--text-muted);
            padding: 2px 6px;
            border-radius: 99px;
            margin: 6px 14px;
            display: inline-block;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div class="header">
        <span class="header-title">LG CFO</span>
        <span class="header-sub">MEGA ERP CONNECTOR</span>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('relat', this)">RELATÓRIOS</div>
        <div class="tab" onclick="switchTab('agnt', this)">AGENTES</div>
    </div>

    <div id="status" class="info">
        <div class="spinner"></div>
        <span id="status-text">Pronto para operar.</span>
    </div>

    <div id="progress-wrap">
        <div id="progress-bar-bg"><div id="progress-bar"></div></div>
        <div id="progress-label">0%</div>
    </div>

    <div id="relat" class="content active">
        <div class="form-group">
            <label>Módulo</label>
            <select id="modulo">
                <option value="list">Razão Contábil</option>
                <option value="agentes">Lista de Agentes</option>
            </select>
        </div>
        <div class="date-row">
            <div class="form-group">
                <label>Data Início</label>
                <input type="date" id="data-inicio">
            </div>
            <div class="form-group">
                <label>Data Fim</label>
                <input type="date" id="data-fim">
            </div>
        </div>
        <button id="btn-sync" class="btn">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 8a7 7 0 0 1 12-4.9"/><path d="M15 8a7 7 0 0 1-12 4.9"/>
                <polyline points="12 3 12 7 16 7"/><polyline points="4 13 4 9 0 9"/>
            </svg>
            Baixar para o Excel
        </button>
    </div>

    <div id="agnt" class="content">
        <div class="section-label">Cadastro em Massa</div>
        <button id="btn-template" class="btn btn-green">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="2" width="12" height="12" rx="1"/><line x1="5" y1="8" x2="11" y2="8"/><line x1="8" y1="5" x2="8" y2="11"/>
            </svg>
            1. Gerar Template de Carga
        </button>
        <button id="btn-enviar" class="btn btn-orange" style="margin-top:8px;">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="2" y1="8" x2="14" y2="8"/><polyline points="9 3 14 8 9 13"/>
            </svg>
            2. Enviar p/ Mega ERP
        </button>
        <p class="agent-note">
            Preencha o template gerado na Etapa 1<br>
            e depois execute a Etapa 2 para importar.
        </p>
    </div>

    <span class="version-badge" id="version-badge">—</span>

    <script>
    // ─────────────────────────────────────────────
    // CONFIGURAÇÃO — atualize a URL a cada novo deploy
    // ─────────────────────────────────────────────
    const GOOGLE_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzObb1ErTCAJ_1HM-36IC_W9181dC97ID7x2MHwNQiw8q8L8tDiOFSiVzzQkTfRP_JI/exec";

    const HEADERS_RAZAO  = ["DATA","LOTE","DOCUMENTO","DOC_FISCAL","DATA_DOC","CONTA","DESC_CONTA","VALOR","D/C","HISTORICO","CENTRO_CUSTO","PROJETO","AGENTE"];
    const HEADERS_AGENTE = ["CODIGO","NOME","TIPO","CPF_CNPJ","EMAIL","TELEFONE","ATIVO"];

    // ─────────────────────────────────────────────
    // UTILS
    // ─────────────────────────────────────────────
    function setStatus(msg, tipo = "info") {
        $("#status").removeClass("info loading sucesso erro").addClass(tipo);
        $("#status-text").text(msg);
    }

    function setProgress(pct, label) {
        if (pct === null) {
            $("#progress-wrap").removeClass("visible");
            $("#progress-bar").css("width", "0%");
        } else {
            $("#progress-wrap").addClass("visible");
            $("#progress-bar").css("width", pct + "%");
            $("#progress-label").text(label || pct + "%");
        }
    }

    function lockBtn(id, locked) {
        const btn = $("#" + id);
        btn.prop("disabled", locked);
        if (id === "btn-sync") {
            btn.html(locked
                ? '<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 8a7 7 0 0 1 12-4.9"/><path d="M15 8a7 7 0 0 1-12 4.9"/><polyline points="12 3 12 7 16 7"/><polyline points="4 13 4 9 0 9"/></svg> Buscando...'
                : '<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 8a7 7 0 0 1 12-4.9"/><path d="M15 8a7 7 0 0 1-12 4.9"/><polyline points="12 3 12 7 16 7"/><polyline points="4 13 4 9 0 9"/></svg> Baixar para o Excel'
            );
        }
    }

    function validarDatas() {
        const ini = $("#data-inicio").val();
        const fim = $("#data-fim").val();
        const ok  = ini && fim && ini <= fim;
        $("#data-inicio, #data-fim").toggleClass("invalid", !ok);
        return ok;
    }

    function switchTab(id, el) {
        $(".content").removeClass("active");
        $(".tab").removeClass("active");
        $("#" + id).addClass("active");
        $(el).addClass("active");
        setStatus("Pronto para operar.", "info");
        setProgress(null);
    }

    function normalizarArray(data) {
        if (Array.isArray(data))               return data;
        if (data && Array.isArray(data.items)) return data.items;
        if (data && Array.isArray(data.Items)) return data.Items;
        if (data && Array.isArray(data.data))  return data.data;
        if (data && (data.Id || data.id))      return [data];
        return [];
    }

    function normalizarItens(detalhe) {
        if (detalhe && Array.isArray(detalhe.Itens) && detalhe.Itens.length > 0) return detalhe.Itens;
        if (detalhe && Array.isArray(detalhe.items) && detalhe.items.length > 0) return detalhe.items;
        if (Array.isArray(detalhe) && detalhe.length > 0)                        return detalhe;
        if (detalhe && (detalhe.ContaDebito || detalhe.ContaCredito))            return [detalhe];
        return [];
    }

    // ─────────────────────────────────────────────
    // INICIALIZAÇÃO
    // ─────────────────────────────────────────────
    Office.onReady((info) => {
        if (info.host === Office.HostType.Excel) {
            const hoje     = new Date();
            const primeiro = new Date(hoje.getFullYear(), hoje.getMonth(), 1);
            const ultimo   = new Date(hoje.getFullYear(), hoje.getMonth() + 1, 0);
            const fmt      = d => d.toISOString().split("T")[0];
            $("#data-inicio").val(fmt(primeiro));
            $("#data-fim").val(fmt(ultimo));

            $("#data-inicio, #data-fim").on("change", validarDatas);
            $("#btn-sync").on("click", syncData);
            $("#btn-template").on("click", gerarTemplateAgentes);
            $("#btn-enviar").on("click", processarInclusoesAgentes);
        }
    });

    // ─────────────────────────────────────────────
    // SYNC PRINCIPAL
    // ─────────────────────────────────────────────
    async function syncData() {
        if (!validarDatas()) {
            setStatus("Data Fim não pode ser anterior à Data Início.", "erro");
            return;
        }

        lockBtn("btn-sync", true);
        setStatus("Buscando lançamentos...", "loading");
        setProgress(5, "Conectando...");

        try {
            const modulo     = $("#modulo").val();
            const dataInicio = $("#data-inicio").val();
            const dataFim    = $("#data-fim").val();

            // ── AGENTES (fluxo simples) ──
            if (modulo === "agentes") {
                const url    = `${GOOGLE_WEBAPP_URL}?action=agentes&nocache=${Date.now()}`;
                const res    = await fetch(url);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const result = await res.json();
                if (!result.success) throw new Error(result.error);
                $("#version-badge").text(result.versao || "—");
                const payload = normalizarArray(result.data);
                if (!payload.length) {
                    setStatus("Nenhum agente encontrado.", "info");
                    setProgress(null); lockBtn("btn-sync", false); return;
                }
                await gravarNoExcel("Agentes", montarTabelaAgentes(payload), null);
                setStatus(`✓ ${payload.length} agente(s) importado(s).`, "sucesso");
                setProgress(null); lockBtn("btn-sync", false); return;
            }

            // ── RAZÃO CONTÁBIL: ETAPA 1 — busca todas as páginas ──
            let todosCabecalhos = [];
            let page = 1;
            const limit = 100;

            while (true) {
                const url = `${GOOGLE_WEBAPP_URL}?action=list&inicio=${dataInicio}&fim=${dataFim}&page=${page}&limit=${limit}&nocache=${Date.now()}`;
                const res = await fetch(url);
                if (!res.ok) throw new Error(`HTTP ${res.status} na página ${page}`);
                const result = await res.json();
                if (!result.success) throw new Error(result.error);
                $("#version-badge").text(result.versao || "—");

                const pagina = normalizarArray(result.data);
                todosCabecalhos = todosCabecalhos.concat(pagina);
                setStatus(`Página ${page} — ${todosCabecalhos.length} lançamentos...`, "loading");
                setProgress(Math.min(30, page * 3), `Página ${page}...`);

                if (pagina.length < limit) break;
                page++;
                if (page > 50) break;
            }

            setStatus(`${todosCabecalhos.length} lançamentos. Buscando detalhes...`, "loading");
            setProgress(35, "Iniciando drilldown...");

            // ── ETAPA 2 — drilldown em lotes de 10 paralelos ──
            const LOTE = 10;
            let dadosParaExcel = [HEADERS_RAZAO];

            for (let i = 0; i < todosCabecalhos.length; i += LOTE) {
                const lote = todosCabecalhos.slice(i, i + LOTE);

                const promessas = lote.map(lanc => {
                    const id = lanc.Id || lanc.id;
                    if (!id) return Promise.resolve({ ...lanc, Itens: [] });
                    const url = `${GOOGLE_WEBAPP_URL}?action=detalhe&id=${id}&nocache=${Date.now()}`;
                    return fetch(url)
                        .then(r => r.json())
                        .then(r => ({ ...lanc, Itens: normalizarItens(r.data) }))
                        .catch(() => ({ ...lanc, Itens: [] }));
                });

                const resultados = await Promise.all(promessas);
                resultados.forEach(lanc => {
                    montarTabelaRazao([lanc]).slice(1).forEach(row => dadosParaExcel.push(row));
                });

                const pct = 35 + Math.round(((i + LOTE) / todosCabecalhos.length) * 60);
                setProgress(Math.min(95, pct), `${Math.min(i + LOTE, todosCabecalhos.length)} / ${todosCabecalhos.length}`);
                setStatus(`Processando ${Math.min(i + LOTE, todosCabecalhos.length)} de ${todosCabecalhos.length}...`, "loading");
            }

            // ── ETAPA 3 — grava no Excel ──
            setStatus("Gravando no Excel...", "loading");
            setProgress(97, "Escrevendo planilha...");
            await gravarNoExcel("Razao_Detalhado", dadosParaExcel, 7);

            const totalLinhas = dadosParaExcel.length - 1;
            setProgress(100, "Concluído");
            setStatus(`✓ ${totalLinhas} linha${totalLinhas !== 1 ? "s" : ""} importada${totalLinhas !== 1 ? "s" : ""} com sucesso.`, "sucesso");
            setTimeout(() => setProgress(null), 1500);

        } catch (error) {
            setStatus(`Erro: ${error.message}`, "erro");
            setProgress(null);
            console.error("[LG CFO]", error);
        } finally {
            lockBtn("btn-sync", false);
        }
    }

    // ─────────────────────────────────────────────
    // MONTADORES DE TABELA
    // ─────────────────────────────────────────────
    function montarTabelaRazao(payload) {
        const rows = [HEADERS_RAZAO];

        payload.forEach(lanc => {
            if (!lanc.Itens || lanc.Itens.length === 0) {
                rows.push([lanc.Data || "", lanc.CodigoLote || "", lanc.Codigo || "",
                    "", "", "SEM ITENS", "", 0, "", "", "", "", ""]);
                return;
            }

            lanc.Itens.forEach(item => {
                const valor = parseFloat(item.Valor || item.ValorLancamento) || 0;

                let hist = item.Complemento || item.Historico || "";
                if (typeof hist === "object") hist = hist.Descricao || "";

                let docFiscal = item.Documento?.Numero || item.Documento?.Codigo || item.NumeroDocumento || "";
                let dataDoc   = item.Documento?.Data   || item.DataDocumento || "";

                let cc = "";
                if (item.RateiosCentroCusto?.length > 0)
                    cc = item.RateiosCentroCusto[0].CentroCusto?.Extenso
                      || item.RateiosCentroCusto[0].CentroCusto?.Reduzido
                      || item.RateiosCentroCusto[0].CentroCusto?.Nome || "";

                let proj = "";
                if (item.RateiosProjeto?.length > 0)
                    proj = item.RateiosProjeto[0].Projeto?.Extenso
                         || item.RateiosProjeto[0].Projeto?.Reduzido
                         || item.RateiosProjeto[0].Projeto?.Nome || "";

                let agente = item.Agente?.Nome || item.Agente?.NomeRazao || item.NomeAgente || "";
                if (typeof agente === "object") agente = agente.Nome || "";

                const base = [lanc.Data || "", lanc.CodigoLote || "", lanc.Codigo || "", docFiscal, dataDoc];
                let temLinha = false;

                if (item.ContaDebito) {
                    rows.push([...base,
                        item.ContaDebito.Extenso  || item.ContaDebito.Reduzido  || "",
                        item.ContaDebito.Descricao  || "",
                        valor, "D", hist, cc, proj, agente]);
                    temLinha = true;
                }
                if (item.ContaCredito) {
                    rows.push([...base,
                        item.ContaCredito.Extenso || item.ContaCredito.Reduzido || "",
                        item.ContaCredito.Descricao || "",
                        valor, "C", hist, cc, proj, agente]);
                    temLinha = true;
                }
                if (!temLinha) {
                    rows.push([...base, "VERIFICAR LANÇAMENTO", "", valor, "", hist, cc, proj, agente]);
                }
            });
        });

        return rows;
    }

    function montarTabelaAgentes(payload) {
        const rows = [HEADERS_AGENTE];
        const lista = Array.isArray(payload) ? payload
                    : payload.items || payload.Items || payload.data || [payload];
        lista.forEach(ag => {
            rows.push([
                ag.Codigo   || ag.Id        || "",
                ag.Nome     || ag.NomeRazao || "",
                ag.Tipo     || ag.TipoAgente || "",
                ag.CpfCnpj  || ag.Documento || "",
                ag.Email    || "",
                ag.Telefone || ag.Celular   || "",
                ag.Ativo !== undefined ? (ag.Ativo ? "Sim" : "Não") : ""
            ]);
        });
        return rows;
    }

    // ─────────────────────────────────────────────
    // GRAVAR NO EXCEL
    // ─────────────────────────────────────────────
    async function gravarNoExcel(sheetName, dados, colunaValor) {
        await Excel.run(async (context) => {
            let sheet = context.workbook.worksheets.getItemOrNullObject(sheetName);
            await context.sync();
            if (sheet.isNullObject) sheet = context.workbook.worksheets.add(sheetName);
            else sheet.getUsedRange().clear();
            sheet.activate();

            const numLinhas = dados.length;
            const numCols   = dados[0].length;
            const range     = sheet.getRangeByIndexes(0, 0, numLinhas, numCols);
            range.values    = dados;

            if (colunaValor !== null && numLinhas > 1) {
                const valorRange = sheet.getRangeByIndexes(1, colunaValor, numLinhas - 1, 1);
                valorRange.numberFormat = Array(numLinhas - 1).fill(["#,##0.00"]);
            }

            const headerRange = sheet.getRangeByIndexes(0, 0, 1, numCols);
            headerRange.format.fill.color = "#0078d4";
            headerRange.format.font.color = "#ffffff";
            headerRange.format.font.bold  = true;
            headerRange.format.font.size  = 10;

            range.format.autofitColumns();
            await context.sync();
        });
    }

    // ─────────────────────────────────────────────
    // AGENTES — TEMPLATE
    // ─────────────────────────────────────────────
    async function gerarTemplateAgentes() {
        lockBtn("btn-template", true);
        setStatus("Gerando template...", "loading");
        try {
            await Excel.run(async (context) => {
                const sheetName = "Template_Agentes";
                let sheet = context.workbook.worksheets.getItemOrNullObject(sheetName);
                await context.sync();
                if (sheet.isNullObject) sheet = context.workbook.worksheets.add(sheetName);
                else sheet.getUsedRange().clear();
                sheet.activate();

                const colunas = ["NOME_RAZAO","TIPO","CPF_CNPJ","EMAIL","TELEFONE","ENDERECO","MUNICIPIO","UF","CEP"];
                const exemplo = [["Empresa Exemplo Ltda","J","00.000.000/0001-00","contato@exemplo.com.br","(11) 99999-9999","Rua das Flores, 100","São Paulo","SP","01001-000"]];

                const h = sheet.getRangeByIndexes(0, 0, 1, colunas.length);
                h.values = [colunas];
                h.format.fill.color = "#107c41";
                h.format.font.color = "#ffffff";
                h.format.font.bold  = true;

                const e = sheet.getRangeByIndexes(1, 0, 1, colunas.length);
                e.values = exemplo;
                e.format.font.italic = true;
                e.format.font.color  = "#888888";

                sheet.getRangeByIndexes(0, 0, 2, colunas.length).format.autofitColumns();
                await context.sync();
            });
            setStatus("✓ Template gerado na aba 'Template_Agentes'.", "sucesso");
        } catch (error) {
            setStatus(`Erro: ${error.message}`, "erro");
            console.error("[LG CFO]", error);
        } finally {
            lockBtn("btn-template", false);
        }
    }

    // ─────────────────────────────────────────────
    // AGENTES — ENVIO
    // ─────────────────────────────────────────────
    async function processarInclusoesAgentes() {
        lockBtn("btn-enviar", true);
        setStatus("Lendo Template_Agentes...", "loading");
        setProgress(5, "Lendo dados...");
        try {
            let agentes = [];
            await Excel.run(async (context) => {
                const sheet = context.workbook.worksheets.getItemOrNullObject("Template_Agentes");
                await context.sync();
                if (sheet.isNullObject) throw new Error("Aba 'Template_Agentes' não encontrada. Gere o template primeiro.");
                const usedRange = sheet.getUsedRange();
                usedRange.load("values");
                await context.sync();
                const values = usedRange.values;
                if (values.length < 2) throw new Error("Nenhum dado encontrado. Preencha ao menos uma linha.");
                const headers = values[0];
                agentes = values.slice(1)
                    .filter(row => row.some(c => c !== "" && c !== null))
                    .map(row => {
                        const obj = {};
                        headers.forEach((h, i) => { obj[h] = row[i] || ""; });
                        return obj;
                    });
            });

            if (!agentes.length) throw new Error("Nenhum agente válido encontrado.");

            setStatus(`Enviando ${agentes.length} agente(s)...`, "loading");
            setProgress(30, `0 / ${agentes.length}`);

            const res = await fetch(GOOGLE_WEBAPP_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ action: "incluirAgentes", agentes })
            });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const result = await res.json();
            if (!result.success) throw new Error(result.error || "Erro no servidor.");

            const ok   = result.incluidos || 0;
            const fail = result.erros     || 0;

            await Excel.run(async (context) => {
                const sheet = context.workbook.worksheets.getItem("Template_Agentes");
                const colResult = sheet.getRangeByIndexes(0, 9, 1, 1);
                colResult.values = [["STATUS_IMPORTACAO"]];
                colResult.format.fill.color = "#107c41";
                colResult.format.font.color = "#ffffff";
                colResult.format.font.bold  = true;
                if (result.resultados?.length > 0) {
                    const statusRange = sheet.getRangeByIndexes(1, 9, result.resultados.length, 1);
                    statusRange.values = result.resultados.map(r => [r.status || "OK"]);
                }
                await context.sync();
            });

            setProgress(100, "Concluído");
            setStatus(`✓ ${ok} incluído(s) | ${fail} erro(s). Veja STATUS_IMPORTACAO.`, ok > 0 ? "sucesso" : "erro");
            setTimeout(() => setProgress(null), 1500);

        } catch (error) {
            setStatus(`Erro: ${error.message}`, "erro");
            setProgress(null);
            console.error("[LG CFO]", error);
        } finally {
            lockBtn("btn-enviar", false);
        }
    }
    </script>
