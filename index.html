<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LG CFO - Mega ERP</title>
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <script type="text/javascript" src="https://ajax.aspnetcdn.com/ajax/jQuery/jquery-3.6.0.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 0; margin: 0; background: #f3f2f1; }
        .tabs { display: flex; background: #fff; border-bottom: 1px solid #ccc; }
        .tab { flex: 1; padding: 12px 0; text-align: center; cursor: pointer; font-size: 13px; font-weight: bold; color: #666; border-bottom: 3px solid transparent; }
        .tab.active { color: #0078d4; border-bottom: 3px solid #0078d4; }
        .content { display: none; padding: 15px; background: #fff; } 
        .content.active { display: block; }
        .form-group { margin-bottom: 15px; }
        label { font-size: 12px; font-weight: bold; display: block; margin-bottom: 5px; color: #333; }
        select, input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .btn { background: #0078d4; color: white; border: none; padding: 10px; width: 100%; cursor: pointer; font-weight: bold; border-radius: 4px; margin-top: 10px; }
        .btn:hover { background: #005a9e; }
        .btn-green { background: #217346; }
        .btn-green:hover { background: #1e6b40; }
        .btn-orange { background: #d83b01; }
        .btn-orange:hover { background: #ea4a1f; }
        #status { margin: 15px; font-size: 13px; font-weight: bold; text-align: center; color: #004085; padding: 12px; background: #cce5ff; border-radius: 4px; border: 1px solid #b8daff; }
    </style>
</head>
<body>
    <div class="tabs">
        <div class="tab active" onclick="switchTab('relat', this)">RELATÓRIOS</div>
        <div class="tab" onclick="switchTab('agnt', this)">AGENTES</div>
    </div>

    <div id="status">Pronto para operar.</div>

    <div id="relat" class="content active">
        <div class="form-group">
            <label>Módulo:</label>
            <select id="modulo">
                <option value="list">Razão Contábil</option>
                <option value="agentes">Lista de Agentes</option>
            </select>
        </div>
        <div style="display:flex; gap:10px;">
            <div class="form-group" style="flex:1;">
                <label>Data Início:</label>
                <input type="date" id="data-inicio" value="2026-03-01">
            </div>
            <div class="form-group" style="flex:1;">
                <label>Data Fim:</label>
                <input type="date" id="data-fim" value="2026-03-31">
            </div>
        </div>
        <button id="btn-sync" class="btn">Baixar para o Excel</button>
    </div>

    <div id="agnt" class="content">
        <p style="font-size: 12px; color: #666; margin-top: 0;">Cadastro em Massa no Mega ERP:</p>
        <button id="btn-template" class="btn btn-green">1. Gerar Template de Carga</button>
        <button id="btn-enviar" class="btn btn-orange">2. Enviar p/ Mega ERP</button>
        <p style="font-size: 11px; color: #999; margin-top: 15px; text-align: center;">O status da integração aparecerá na coluna G da planilha.</p>
    </div>

    <script>
        function switchTab(id, el) {
            $('.content').removeClass('active');
            $('.tab').removeClass('active');
            $('#' + id).addClass('active');
            $(el).addClass('active');
        }

        const GOOGLE_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzciT5t9vTQHyrsYHt5KLUNsGJcFYX4wn0O9EwN5Jpa0msNX6hxpdNXDgBLuCSdgy_x/exec";

        Office.onReady((info) => {
          if (info.host === Office.HostType.Excel) {
            $(document).ready(() => {
              $("#btn-sync").on("click", syncData);
              $("#btn-template").on("click", gerarTemplateAgentes);
              $("#btn-enviar").on("click", processarInclusoesAgentes);
            });
          }
        });

async function syncData() {
          try {
            $("#status").text("Consultando Razão Detalhado... Aguarde.");
            const modulo = $("#modulo").val();
            const dataInicio = $("#data-inicio").val();
            const dataFim = $("#data-fim").val();

            const urlSemCache = `${GOOGLE_WEBAPP_URL}?action=${modulo}&inicio=${dataInicio}&fim=${dataFim}&nocache=${new Date().getTime()}`;
            
            const res = await fetch(urlSemCache);
            const result = await res.json();
            
            // CAPTURANDO A VERSÃO (Seu pedido)
            const versaoApi = result.versao || "Versão Fantasma";
            const payload = result.data;

            if (!payload || payload.length === 0) {
              $("#status").text(`[${versaoApi}] Nenhum dado encontrado.`);
              return;
            }

            $("#status").text(`[${versaoApi}] Dados recebidos! Desenhando tabela...`);
            
            let totalLinhas = 0; // Variável criada no lugar certo para não dar erro

            await Excel.run(async (context) => {
              let sheetName = "Razao_Detalhado";
              let sheet = context.workbook.worksheets.getItemOrNullObject(sheetName);
              await context.sync();
              
              if (sheet.isNullObject) sheet = context.workbook.worksheets.add(sheetName);
              else sheet.getUsedRange().clear();
              
              sheet.activate();

              let headers = ["DATA", "LOTE", "DOCUMENTO", "CONTA", "DESC_CONTA", "VALOR", "D/C", "HISTORICO", "CENTRO_CUSTO", "PROJETO", "AGENTE"];
              let dadosParaExcel = [headers];

              payload.forEach(lanc => {
                if (lanc.Itens && lanc.Itens.length > 0) {
                  lanc.Itens.forEach(item => {
                    let valor = parseFloat(item.Valor) || 0; 
                    let centroCusto = item.CodigoCentroCusto || item.CentroCusto || "";
                    let projeto = item.CodigoProjeto || item.Projeto || "";
                    let agente = item.NomeAgente || item.CodigoAgente || item.Agente || "";

                    if (typeof centroCusto === 'object') centroCusto = centroCusto.Nome || centroCusto.Codigo || "";
                    if (typeof projeto === 'object') projeto = projeto.Nome || projeto.Codigo || "";
                    if (typeof agente === 'object') agente = agente.Nome || agente.Codigo || "";

                    dadosParaExcel.push([
                      lanc.Data || "",
                      lanc.CodigoLote || "",
                      lanc.Codigo || "",
                      item.EstruturaContabil || "",
                      item.DescricaoContaContabil || "",
                      valor, 
                      item.TipoLancamento || "", 
                      item.Historico || "",
                      centroCusto,
                      projeto,
                      agente
                    ]);
                  });
                } else {
                  dadosParaExcel.push([lanc.Data, lanc.CodigoLote, lanc.Codigo, "SEM ITENS", "", 0, "", "", "", "", ""]);
                }
              });

              totalLinhas = dadosParaExcel.length - 1; // Guarda a contagem corretamente

              const range = sheet.getRangeByIndexes(0, 0, dadosParaExcel.length, dadosParaExcel[0].length);
              range.values = dadosParaExcel;
              
              // Bloco de formatação protegido
              try {
                  if (totalLinhas > 0) {
                      const valorRange = sheet.getRangeByIndexes(1, 5, totalLinhas, 1);
                      let formatoMoeda = [];
                      for(let i = 0; i < totalLinhas; i++) {
                          formatoMoeda.push(["#,##0.00"]);
                      }
                      valorRange.numberFormat = formatoMoeda;
                  }
              } catch(e) {
                  console.log("Aviso formatação:", e);
              }

              range.format.autofitColumns();
              sheet.getRange("A1:K1").format.fill.color = "#0078d4";
              sheet.getRange("A1:K1").format.font.color = "white";
              sheet.getRange("A1:K1").format.font.bold = true;
              
              await context.sync();
            });

            // A MENSAGEM FINAL AGORA VAI FUNCIONAR E MOSTRAR A VERSÃO
            $("#status").text(`[${versaoApi}] Sucesso! ${totalLinhas} linhas na tela.`);
          } catch (error) {
            $("#status").text(`Erro Excel: ${error.message || "Falha na criação da aba."}`);
          }
        }

        async function gerarTemplateAgentes() {
          await Excel.run(async (context) => {
            let sheetName = "Carga_Agentes";
            let sheet = context.workbook.worksheets.getItemOrNullObject(sheetName);
            await context.sync();
            if (sheet.isNullObject) sheet = context.workbook.worksheets.add(sheetName);
            else sheet.getUsedRange().clear();
            sheet.activate();
            const headers = [["NOME", "APELIDO", "TIPO (F/J)", "CPF_CNPJ", "LOGRADOURO", "IBGE_MUNICIPIO", "STATUS/ERRO"]];
            const range = sheet.getRange("A1:G1");
            range.values = headers;
            range.format.fill.color = "#217346";
            range.format.font.color = "white";
            range.format.font.bold = true;
            range.format.autofitColumns();
            $("#status").text("Aba de Carga criada! Preencha e clique em Enviar.");
            await context.sync();
          });
        }

        async function processarInclusoesAgentes() {
          await Excel.run(async (context) => {
            $("#status").text("Analisando e enviando dados...");
            const sheet = context.workbook.worksheets.getActiveWorksheet();
            const usedRange = sheet.getUsedRange();
            usedRange.load("values, rowCount");
            await context.sync();

            const dados = usedRange.values;
            if (dados.length <= 1) {
              $("#status").text("Nenhum dado encontrado.");
              return; 
            }

            let enviados = 0, erros = 0;

            for (let i = 1; i < dados.length; i++) {
              const nome = dados[i][0];
              const tipo = dados[i][2]?.toUpperCase();
              const cpfCnpj = dados[i][3]?.toString().replace(/\D/g, '');
              const ibge = dados[i][5]?.toString();

              let erroLocal = "";
              if (!nome) erroLocal = "Nome obrigatório";
              else if (!tipo || (tipo !== 'F' && tipo !== 'J')) erroLocal = "Tipo deve ser F ou J";
              else if (!validarCpfCnpj(cpfCnpj)) erroLocal = "CPF/CNPJ Inválido";
              else if (!ibge || ibge.length !== 7) erroLocal = "IBGE deve ter 7 dígitos";

              const rangeLinha = sheet.getRange(`A${i + 1}:F${i + 1}`);
              const rangeStatus = sheet.getRange(`G${i + 1}`);

              if (erroLocal) {
                rangeLinha.format.fill.color = "#FFC7CE";
                rangeStatus.values = [[erroLocal]];
                erros++;
                continue;
              }

              try {
                const payload = {
                  action: "cadastrarAgente",
                  data: {
                    AgenteNome: nome, AgenteApelido: dados[i][1] || nome, AgenteTipo: tipo,
                    CpfCnpj: cpfCnpj, EnderecoLogradouro: dados[i][4] || "", MunicipioCodigoIBGE: ibge
                  }
                };

                const response = await fetch(GOOGLE_WEBAPP_URL, { method: "POST", body: JSON.stringify(payload) });
                const result = await response.json();

                if (result.success) {
                  rangeLinha.format.fill.color = "#C6EFCE";
                  rangeStatus.values = [["Sucesso"]];
                  enviados++;
                } else {
                  rangeLinha.format.fill.color = "#FFC7CE";
                  rangeStatus.values = [[result.response]];
                  erros++;
                }
              } catch (err) {
                rangeStatus.values = [["Erro de Conexão"]];
                erros++;
              }
            }
            await context.sync();
            $("#status").text(`Concluído: ${enviados} Cadastros | ${erros} Erros.`);
          });
        }
        function validarCpfCnpj(val) { if (!val) return false; return (val.length === 11 || val.length === 14); }
    </script>
</body>
</html>
